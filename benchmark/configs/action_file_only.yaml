# Action Gating ablation: expose only safe read/search file tools.
#
# This config tests whether F1 code QA can keep quality while removing shell
# execution and file mutation actions from the agent action space.

observation_shaping:
  memory_prefetch_enabled: false
  memory_prefetch_top_k: 0
  context_compression_enabled: false
  context_compression_threshold: null
  context_compression_target_ratio: null
  pre_llm_call_injection: false
  session_context_injection: false
  tool_schema_narrowing: true
  prefill_message_count: 0

action_gating:
  enabled_toolsets: [file]
  disabled_toolsets: []
  allow_tools: [read_file, search_files]
  deny_tools: []
  delegation_allowed: false
  approval_mode: auto
  pre_tool_call_block_strictness: schema
  clarify_enabled: false
  disable_high_risk_tools: false

transition_control:
  max_iterations: 30
  turn_budget_chars: 50000
  retry_max: 2
  fallback_enabled: false
  timeout_per_tool_sec: 60
  cleanup_granularity: per_session
  concurrent_tool_execution: false

execution:
  model: kimi-k2.6
  provider: kimi-coding
  base_url: https://api.moonshot.cn/v1
  api_key_env: HERMES_BENCH_API_KEY
  strict_runtime: true
  env: docker
  seeds_per_task: 3
