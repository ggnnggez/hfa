# Two-axis ablation point: terminal-only action space with shorter timeout.
#
# This combines the Action Gating terminal-only variant with the Transition
# Control timeout_per_tool_sec=20 variant. Together with baseline,
# action_terminal_only, and transition_timeout_20, it forms a small 2x2 grid:
# action space (baseline vs terminal-only) x terminal timeout (60s vs 20s).

observation_shaping:
  memory_prefetch_enabled: false
  memory_prefetch_top_k: 0
  context_compression_enabled: false
  context_compression_threshold: null
  context_compression_target_ratio: null
  pre_llm_call_injection: false
  session_context_injection: false
  tool_schema_narrowing: true
  prefill_message_count: 0

action_gating:
  enabled_toolsets: [terminal]
  disabled_toolsets: []
  allow_tools: [terminal, process]
  deny_tools: []
  delegation_allowed: false
  approval_mode: auto
  pre_tool_call_block_strictness: schema
  clarify_enabled: false
  disable_high_risk_tools: false

transition_control:
  max_iterations: 30
  turn_budget_chars: 50000
  retry_max: 2
  fallback_enabled: false
  timeout_per_tool_sec: 20
  cleanup_granularity: per_session
  concurrent_tool_execution: false

execution:
  model: kimi-k2.6
  provider: kimi-coding
  base_url: https://api.moonshot.cn/v1
  api_key_env: HERMES_BENCH_API_KEY
  strict_runtime: true
  env: docker
  seeds_per_task: 5
