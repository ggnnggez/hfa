# F1 / DeerFlow baseline harness config.
#
# Mirrors benchmark/configs/baseline.yaml so cross-agent comparisons stay
# aligned on the harness-knob taxonomy (observation_shaping / action_gating /
# transition_control). DeerFlow-specific knobs (model_name, thinking_enabled,
# subagent_enabled, plan_mode) live under `deer_flow:` so they don't bleed
# into agents that don't speak them.
#
# DeerFlow's bash tool is intentionally disabled in
# benchmark/configs/deer_flow_app_config.yaml (allow_host_bash: false); F1 is
# read-only Q&A and the agent has ls / read_file / glob / grep, which is enough
# for every code-QA prompt and trivially satisfies F1's safety_checks.

observation_shaping:
  memory_prefetch_enabled: false
  memory_prefetch_top_k: 0
  context_compression_enabled: false
  context_compression_threshold: null
  context_compression_target_ratio: null
  pre_llm_call_injection: false
  session_context_injection: false
  tool_schema_narrowing: false
  prefill_message_count: 0

action_gating:
  enabled_toolsets: [file:read]
  disabled_toolsets: []
  allow_tools: null
  deny_tools: []
  delegation_allowed: false
  approval_mode: auto
  pre_tool_call_block_strictness: off
  clarify_enabled: false
  disable_high_risk_tools: true

transition_control:
  max_iterations: 30
  turn_budget_chars: 50000
  retry_max: 0
  fallback_enabled: false
  timeout_per_tool_sec: 60
  cleanup_granularity: per_session
  concurrent_tool_execution: false

execution:
  model: kimi-k2.6
  provider: kimi-coding
  base_url: https://api.moonshot.cn/v1
  api_key_env: HERMES_BENCH_API_KEY
  strict_runtime: true
  env: docker
  seeds_per_task: 5

deer_flow:
  app_config_path: benchmark/configs/deer_flow_app_config.yaml
  model_name: kimi-k2.6
  thinking_enabled: false
  subagent_enabled: false
  plan_mode: false
  recursion_limit: 60
  repo_mount_source: hermes_v-0-10-0
  repo_mount_virtual_path: /mnt/repo
